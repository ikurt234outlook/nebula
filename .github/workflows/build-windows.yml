name: Build Windows package

# Compatible with Actions policy "Allow local actions only" (no marketplace actions).
# For workflow_dispatch runs the zip is published as prerelease tag `ci-windows`.
# For `v*` tags a normal versioned Release is created.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Clone repository
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --filter=blob:none "https://github.com/${env:GITHUB_REPOSITORY}.git" work
          Set-Location work
          git checkout --force $env:GITHUB_SHA
          git log -1 --oneline
          Get-ChildItem

      - name: Install Rust 1.85
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          $cargoBin = Join-Path $env:USERPROFILE '.cargo\bin'
          if (-not (Test-Path (Join-Path $cargoBin 'cargo.exe'))) {
            Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            ./rustup-init.exe -y --default-toolchain 1.85.0 --profile minimal
          } else {
            & "$cargoBin\rustup.exe" toolchain install 1.85.0 --profile minimal
            & "$cargoBin\rustup.exe" default 1.85.0
          }
          Add-Content -Path $env:GITHUB_PATH -Value $cargoBin
          & "$cargoBin\rustc.exe" --version
          & "$cargoBin\cargo.exe" --version

      - name: Build release
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          cargo build --release

      - name: Stage package
        working-directory: work
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $ver = $env:GITHUB_REF_NAME
          } else {
            $ver = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          }
          $dir = "NebulaTerminal-$ver-windows-x64"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null

          Copy-Item target/release/nebula.exe $dir/
          if (Test-Path target/release/nebula-hook.exe) {
            Copy-Item target/release/nebula-hook.exe $dir/
          } else {
            Write-Host '::warning::nebula-hook.exe not found; package will omit it'
          }

          $font = 'assets/fonts/MapleMonoNormal-NF-CN-Regular.ttf'
          if (Test-Path $font) {
            Copy-Item $font $dir/
          } else {
            Write-Host "::warning::font missing: $font"
          }

          if (Test-Path 'assets/windows/conhost') {
            Copy-Item assets/windows/conhost/* $dir/ -ErrorAction SilentlyContinue
          } else {
            Write-Host '::warning::assets/windows/conhost missing; package uses in-box ConPTY fallback'
          }

          Get-ChildItem $dir | Format-Table Name, Length
          $zipName = "$dir.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path $dir -DestinationPath $zipName -Force
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          Write-Host "PACKAGE=$zipName"
          Write-Host "SHA256=$hash"
          Copy-Item $zipName "../$zipName" -Force
          @"
          ## Windows package

          - File: ``$zipName``
          - Size: $([math]::Round((Get-Item $zipName).Length / 1MB, 2)) MB
          - SHA-256: ``$hash``
          - Commit: ``$env:GITHUB_SHA``
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Publish prerelease (manual / non-tag runs)
        if: github.ref_type != 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Filter 'NebulaTerminal-*-windows-x64.zip' | Select-Object -First 1
          if (-not $zip) { throw 'package zip not found' }
          $tag = 'ci-windows'
          $notes = @"
          Automated Windows build from ``$env:GITHUB_SHA``.

          This prerelease is overwritten by each manual workflow run.
          "@
          # Replace rolling prerelease so the latest zip is always downloadable.
          gh release delete $tag --repo $env:GITHUB_REPOSITORY --yes 2>$null
          gh release create $tag $zip.FullName `
            --repo $env:GITHUB_REPOSITORY `
            --prerelease `
            --title "CI Windows build" `
            --notes $notes

      - name: Publish versioned release (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem -Filter 'NebulaTerminal-*-windows-x64.zip' | Select-Object -First 1
          if (-not $zip) { throw 'package zip not found' }
          gh release create $env:GITHUB_REF_NAME $zip.FullName `
            --repo $env:GITHUB_REPOSITORY `
            --title "Nebula Terminal $($env:GITHUB_REF_NAME)" `
            --generate-notes
